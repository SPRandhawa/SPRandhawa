name: Update Repo Section

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate repo section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          import re

          username = 'SPRandhawa'
          token = os.environ.get('GITHUB_TOKEN')
          headers = {"Authorization": f"token {token}"}

          resp = requests.get(
              f'https://api.github.com/users/{username}/repos?per_page=100&sort=updated',
              headers=headers
          )
          repos = [r for r in resp.json() if not r['fork']]
          repos.sort(key=lambda x: x['stargazers_count'], reverse=True)

          content = '<div align="center">\n\n'
          content += '## 📦 Public Repositories\n\n'

          # Badges per repo
          for r in repos:
              lang = r['language'] or 'N/A'
              lang_encoded = lang.replace(' ', '%20').replace('+', '%2B')
              name_encoded = r['name'].replace(' ', '%20')
              desc = r['description'] or 'No description'

              content += f"### [{r['name']}]({r['html_url']})\n"
              content += f"> {desc}\n\n"
              content += f"![Stars](https://img.shields.io/badge/Stars-{r['stargazers_count']}-FFD700?style=flat-square&logo=github) "
              content += f"![Forks](https://img.shields.io/badge/Forks-{r['forks_count']}-00f5ff?style=flat-square&logo=github) "
              content += f"![Language](https://img.shields.io/badge/Language-{lang_encoded}-6e40c9?style=flat-square) "
              content += f"![Updated](https://img.shields.io/badge/Updated-{r['updated_at'][:10]}-2ecc71?style=flat-square)\n\n"
              content += "---\n\n"

          # Table Section
          content += '| 📁 Repository | 💻 Language | ⭐ Stars | 🍴 Forks | 📅 Last Updated |\n'
          content += '|---|---|---|---|---|\n'
          for r in repos:
              lang = r['language'] or 'N/A'
              updated = r['updated_at'][:10]
              content += f"| [{r['name']}]({r['html_url']}) | {lang} | {r['stargazers_count']} | {r['forks_count']} | {updated} |\n"

          content += '\n</div>'

          with open('README.md', 'r') as f:
              readme = f.read()

          new_readme = re.sub(
              r'<!-- REPOS-SECTION-START -->.*?<!-- REPOS-SECTION-END -->',
              f'<!-- REPOS-SECTION-START -->\n{content}\n<!-- REPOS-SECTION-END -->',
              readme,
              flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(new_readme)

          print("README updated successfully!")
          EOF

      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add README.md
          git diff --staged --quiet || git commit -m "🔄 Auto-update repo section"
          git push
